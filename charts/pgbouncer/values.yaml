postgres:
  host: postgres-postgresql
  port: 5432

# Credentials for the pgbouncer_auth user (created by postgresql initdb script).
# All other users are authenticated dynamically via auth_query against pg_shadow.
auth:
  password: "pgbouncer_auth_pass"

image:
  pgbouncer: edoburu/pgbouncer:v1.23.1-p3
  exporter: prometheuscommunity/pgbouncer-exporter:v0.9.0

dashboard:
  enabled: true

apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: infra-local

requires:
  # Bring up Postgres first so dependent services can start after it is ready.
  - configs:
      - postgres
  - configs:
      - pgbouncer
      - redis
      - kafka
      - vault-push

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: postgres

deploy:
  helm:
    releases:
      - name: postgres
        repo: "{{.CHARTS_REPO}}"
        remoteChart: postgresql
        namespace: "{{.NAMESPACE}}"
        createNamespace: true
        valuesFiles:
          - values/postgresql-values.yaml
        wait: true

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: redis

deploy:
  helm:
    releases:
      - name: redis
        repo: "{{.CHARTS_REPO}}"
        remoteChart: redis
        namespace: "{{.NAMESPACE}}"
        createNamespace: true
        valuesFiles:
          - values/redis-values.yaml
        wait: true

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: kafka

manifests:
  rawYaml:
    - manifests/kafka-cluster.yaml

deploy:
  kubectl:
    defaultNamespace: "{{.NAMESPACE}}"
  helm:
    releases:
      - name: strimzi
        repo: "{{.CHARTS_REPO}}"
        remoteChart: strimzi-kafka-operator
        namespace: "{{.NAMESPACE}}"
        createNamespace: true
        valuesFiles:
          - values/strimzi-values.yaml
        wait: true

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: pgbouncer

manifests:
  kustomize:
    paths:
      - manifests/pgbouncer

deploy:
  kubectl:
    defaultNamespace: "{{.NAMESPACE}}"

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-push

# PushSecrets push postgres/redis credentials from Bitnami K8s Secrets to Vault KV.
# Requires postgres and redis to be deployed first (K8s Secrets must exist).
# Requires ESO + Vault to be running (managed by infra repo, deployed separately).
# PushSecrets retry automatically — ordering with infra is handled by retry backoff.
requires:
  - configs:
      - postgres
      - redis

manifests:
  kustomize:
    paths:
      - manifests/vault-push

deploy:
  kubectl:
    defaultNamespace: "{{.NAMESPACE}}"

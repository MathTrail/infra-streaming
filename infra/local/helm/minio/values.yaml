minio:
  mode: standalone

  existingSecret: "minio-root-creds"

  # MinIO Console is served at https://minio.mathtrail.localhost/ (own subdomain).
  # CONSOLE_SUBPATH removed — subdomain approach avoids /api/v1 conflict with mentor-api.

  # Use the chart's native oidc: section so CLIENT_SECRET is loaded from a K8s Secret.
  # minio chart v5.4.0 ignores extraEnv — extraEnv is not a supported field.
  # minio-oidc-creds K8s Secret is synced from Vault by VaultStaticSecret (vault-static-secret-oidc.yaml)
  oidc:
    enabled: true
    configUrl: "http://hydra-public.identity.svc.cluster.local:4444/.well-known/openid-configuration"
    clientId: "minio-console"
    existingClientSecretName: "minio-oidc-creds"
    existingClientSecretKey: "MINIO_IDENTITY_OPENID_CLIENT_SECRET"
    claimName: "minio_policy"
    scopes: "openid,profile,email"
    redirectUri: "https://minio.mathtrail.localhost/oauth_callback"
    displayName: "MathTrail"

  # REDIRECT_URI_DYNAMIC is not in the chart's oidc template — set via environment:
  # TLS_SKIP_VERIFY is not a valid MinIO env var; Hydra is served over HTTP so TLS is not needed.
  environment:
    MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC: "on"

  # Trust the local dev CA so MinIO can verify the jwks_uri TLS cert (https://mathtrail.localhost)
  trustedCertsSecret: "minio-trusted-ca"

  persistence:
    enabled: true
    size: 20Gi

  # Standalone mode uses a single RWO PV. maxSurge: 0 is required — a new pod cannot
  # mount the same RWO volume while the old pod still holds it. Accept ~10s downtime
  # during rollout restart in exchange for correctness.
  deploymentUpdate:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 0

  buckets:
    - name: automq-data
      policy: none
    - name: risingwave-data
      policy: none

  # PV is provisioned on k3d-mathtrail-dev-server-0 (control-plane node). Tolerate the
  # NoSchedule taint so the pod can always schedule where its volume lives after a reboot.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  resources:
    requests:
      memory: 256Mi
      cpu: 100m

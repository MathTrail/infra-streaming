minio:
  global:
    security:
      allowInsecureImages: true

  image:
    registry: quay.io
    repository: minio/minio
    tag: RELEASE.2025-09-07T16-13-09Z

  console:
    enabled: false

  auth:
    rootUser: ""
    rootPassword: ""
    existingSecret: "minio-root-creds"

  persistence:
    enabled: true
    size: 20Gi

  defaultBuckets: "automq-data,risingwave-data"

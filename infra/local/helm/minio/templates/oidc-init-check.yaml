# CronJob watchdog: every minute, verify MinIO OIDC is initialized.
# If Hydra is unreachable (identity not deployed), silently skips — infra-streaming
# deploys independently. If Hydra is up but MinIO OIDC failed at startup (race
# condition: MinIO started before Hydra was ready), restarts the deployment so
# MinIO re-initializes its OIDC provider. Eventual consistency, not a sync barrier.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-oidc-check
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-oidc-check
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["streaming-minio"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-oidc-check
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: minio-oidc-check
    namespace: streaming
roleRef:
  kind: Role
  name: minio-oidc-check
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-oidc-check
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          serviceAccountName: minio-oidc-check
          restartPolicy: Never
          containers:
            - name: check
              image: alpine/k8s:1.31.4
              command:
                - sh
                - -c
                - |
                  HYDRA_URL="http://hydra-public.identity.svc.cluster.local:4444/.well-known/openid-configuration"
                  MINIO_URL="http://streaming-minio-console.streaming.svc.cluster.local:9001"

                  # Probe Hydra with a strict timeout — if unreachable, identity is not
                  # deployed yet or is restarting. Skip silently so infra-streaming
                  # deploys stay independent.
                  if ! curl -sSf --connect-timeout 3 "$HYDRA_URL" > /dev/null 2>&1; then
                    echo "Hydra is unreachable. Skipping OIDC check."
                    exit 0
                  fi

                  STRATEGY=$(curl -sf --connect-timeout 3 "$MINIO_URL/api/v1/login" \
                    | grep -o '"loginStrategy":"[^"]*"' | cut -d'"' -f4)
                  echo "MinIO loginStrategy: ${STRATEGY:-<empty>}"

                  if [ "$STRATEGY" = "redirect" ]; then
                    echo "OIDC initialized correctly. No action needed."
                    exit 0
                  fi

                  echo "OIDC not initialized (strategy=${STRATEGY:-<empty>}). Restarting MinIO..."
                  kubectl rollout restart deployment/streaming-minio -n streaming

                  for i in $(seq 1 24); do
                    READY=$(kubectl get deployment streaming-minio -n streaming \
                      -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                    DESIRED=$(kubectl get deployment streaming-minio -n streaming \
                      -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
                    if [ "$READY" = "$DESIRED" ] && [ "$READY" != "0" ]; then
                      echo "MinIO ready ($READY/$DESIRED). Verifying OIDC..."
                      sleep 5
                      STRATEGY=$(curl -sf --connect-timeout 3 "$MINIO_URL/api/v1/login" \
                        | grep -o '"loginStrategy":"[^"]*"' | cut -d'"' -f4)
                      echo "MinIO loginStrategy after restart: ${STRATEGY:-<empty>}"
                      exit 0
                    fi
                    echo "  attempt $i/24: ready=$READY desired=$DESIRED, waiting 5s..."
                    sleep 5
                  done

                  echo "MinIO did not become ready within 120s. Will retry next tick."
                  exit 0

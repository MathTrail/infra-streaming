# Copies the local dev CA certificate into the streaming namespace so MinIO can verify
# TLS when fetching Hydra's jwks_uri (https://mathtrail.localhost/.well-known/jwks.json).
# Runs as a pre-install/pre-upgrade hook to ensure the secret exists before MinIO starts.
# ArgoCD converts Helm hooks to PreSync/PostSync hooks.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-ca-copy
  namespace: streaming
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
# ClusterRole grants read access to the CA secret in cert-manager namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streaming-minio-ca-copy
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mathtrail-internal-ca-secret"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: streaming-minio-ca-copy
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: minio-ca-copy
    namespace: streaming
roleRef:
  kind: ClusterRole
  name: streaming-minio-ca-copy
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-ca-copy
  namespace: streaming
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: minio-ca-copy
      restartPolicy: OnFailure
      containers:
        - name: copy-ca
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              CA_CRT=$(kubectl get secret mathtrail-internal-ca-secret -n cert-manager \
                -o jsonpath='{.data.tls\.crt}' | base64 -d)
              kubectl create secret generic minio-trusted-ca -n streaming \
                --from-literal="public.crt=$CA_CRT" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "minio-trusted-ca created/updated."

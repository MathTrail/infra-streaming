kafka-ui:
  envs:
    config:
      SERVER_SERVLET_CONTEXT_PATH: /observability/kafka-ui
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=50.0 -XX:MaxMetaspaceSize=150m -XX:+UseContainerSupport"
  yamlApplicationConfig:
    kafka:
      clusters:
        - name: local
          # AutoMQ bootstrap server (Kafka-compatible API, SASL_PLAINTEXT)
          bootstrapServers: streaming-automq-kafka.streaming.svc.cluster.local:9092
          properties:
            # AutoMQ local dev uses PLAINTEXT only.
            # SCRAM-SHA-512 deadlocks KRaft bootstrap (credential store needs quorum,
            # quorum needs auth), so SASL is disabled entirely for local k3d.
            security.protocol: PLAINTEXT
          # Apicurio Schema Registry — Confluent compat API (Protobuf schemas)
          schemaRegistry: http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080/apis/ccompat/v7

  resources:
    requests:
      memory: 384Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

  service:
    type: ClusterIP
    port: 8080

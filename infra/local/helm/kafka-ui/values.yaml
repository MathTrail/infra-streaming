kafka-ui:
  envs:
    config:
      SERVER_SERVLET_CONTEXT_PATH: /observability/kafka-ui
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=50.0 -XX:MaxMetaspaceSize=150m -XX:+UseContainerSupport"

  yamlApplicationConfig:
    kafka:
      clusters:
        - name: local
          # AutoMQ bootstrap server (Kafka-compatible API, SASL_PLAINTEXT)
          bootstrapServers: automq:9092
          properties:
            security.protocol: SASL_PLAINTEXT
            sasl.mechanism: SCRAM-SHA-512
            # SASL credentials injected via K8s Secret (automq-kafka-ui-scram)
            sasl.jaas.config: "${KAFKA_UI_SASL_JAAS_CONFIG}"
          # Apicurio Schema Registry — Confluent compat API (Protobuf schemas)
          schemaRegistry: http://apicurio:8080/apis/ccompat/v7

  # Inject SASL credentials from K8s Secret
  extraEnvs:
    - name: KAFKA_UI_SASL_JAAS_CONFIG
      valueFrom:
        secretKeyRef:
          name: automq-kafka-ui-scram
          key: jaas.config

  resources:
    requests:
      memory: 384Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

  service:
    type: ClusterIP
    port: 8080

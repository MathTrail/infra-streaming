# Debezium CDC — connects to Kratos PostgreSQL and produces CDC events to Kafka

kafka:
  # Bootstrap server for Strimzi KafkaConnect (TLS listener)
  bootstrapServers: kafka-kafka-tls-bootstrap:9093
  # Kafka protocol version — must match the Strimzi Kafka CR version
  version: "4.1.1"

connect:
  # Container image output for the Strimzi build (must be accessible from k3d cluster)
  image: k3d-mathtrail-registry:5000/debezium-connect:0.2.0
  # Debezium PostgreSQL connector plugin URL
  debeziumPluginUrl: "https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/3.1.1.Final/debezium-connector-postgres-3.1.1.Final-plugin.tar.gz"

postgres:
  # Kratos PostgreSQL host (Bitnami chart service name)
  host: identity-postgres-postgresql
  port: "5432"
  database: kratos
  # Secret created by VSO from Vault KV v2 path: local/mathtrail-debezium-kratos
  credentialsSecret: debezium-pg-creds

vault:
  # Vault KV v2 mount
  mount: secret
  # Path within the mount (must contain fields: username, password)
  path: local/mathtrail-debezium-kratos
  # VSO VaultAuth reference (must already exist in the cluster)
  authRef: vault-auth

apicurio:
  url: "http://mathtrail-apicurio-apicurio-registry:8080/apis/registry/v2"
  serdesUrl: "https://repo1.maven.org/maven2/io/apicurio/apicurio-registry-serdes-avro-serde/3.2.0/apicurio-registry-serdes-avro-serde-3.2.0-all.jar"

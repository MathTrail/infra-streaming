# Strimzi KafkaConnect CR with embedded Debezium PostgreSQL connector plugin.
# Strimzi operator builds a custom Docker image (debezium-connect) containing
# the connector JAR, then deploys it as a Connect cluster.
#
# version: Kafka protocol version — must match the Strimzi Kafka CR.
# KafkaUser "debezium" (tls type) provides mTLS credentials.
# config.providers.file allows injecting DB credentials from mounted Secret files.

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium
  annotations:
    # Allow KafkaConnector CRs to manage connectors via this Connect cluster
    strimzi.io/use-connector-resources: "true"
spec:
  version: {{ .Values.kafka.version }}
  replicas: 1
  bootstrapServers: {{ .Values.kafka.bootstrapServers }}

  # mTLS to Kafka (cert from Strimzi CA)
  tls:
    trustedCertificates:
      - secretName: kafka-cluster-ca-cert
        certificate: ca.crt

  # KafkaUser "debezium" secret (tls type) — created by Strimzi UserOperator
  authentication:
    type: tls
    certificateAndKey:
      secretName: debezium
      certificate: user.crt
      key: user.key

  # Mount Vault-synced secret so FileConfigProvider can read DB credentials
  externalConfiguration:
    volumes:
      - name: debezium-pg-creds
        secret:
          secretName: {{ .Values.postgres.credentialsSecret }}

  # Strimzi builds a custom Connect image with the Debezium plugin bundled
  build:
    output:
      type: docker
      image: {{ .Values.connect.image }}
      additionalKanikoOptions:
        - "--insecure"
        - "--insecure-pull"
    plugins:
      - name: debezium-postgres
        artifacts:
          - type: tgz
            url: {{ .Values.connect.debeziumPluginUrl }}
          - type: zip
            url: {{ .Values.connect.apicurioConverterUrl }}

  config:
    # DirectoryConfigProvider — reads individual files from mounted Secret directory
    # Syntax: ${dir:/opt/kafka/external-configuration/<secret-name>:<key>}
    config.providers: dir
    config.providers.dir.class: org.apache.kafka.common.config.provider.DirectoryConfigProvider

    # Avro via Apicurio AvroConverter in Confluent-compatible wire format
    # as-confluent + use-id=contentId → [0x00][4-byte int][avro] — readable by Flink avro-confluent
    # headers.enabled=false — schema ID in payload, not Kafka headers
    key.converter: io.apicurio.registry.utils.converter.AvroConverter
    key.converter.apicurio.registry.url: {{ .Values.apicurio.url }}
    key.converter.apicurio.registry.as-confluent: "true"
    key.converter.apicurio.registry.use-id: contentId
    key.converter.apicurio.registry.headers.enabled: "false"
    key.converter.apicurio.registry.auto-register: "true"
    value.converter: io.apicurio.registry.utils.converter.AvroConverter
    value.converter.apicurio.registry.url: {{ .Values.apicurio.url }}
    value.converter.apicurio.registry.as-confluent: "true"
    value.converter.apicurio.registry.use-id: contentId
    value.converter.apicurio.registry.headers.enabled: "false"
    value.converter.apicurio.registry.auto-register: "true"

    # Internal Connect topics — names must match KafkaUser ACL prefix (connect-debezium-)
    group.id: connect-debezium
    offset.storage.topic: connect-debezium-offsets
    config.storage.topic: connect-debezium-configs
    status.storage.topic: connect-debezium-status
    offset.storage.replication.factor: "1"
    config.storage.replication.factor: "1"
    status.storage.replication.factor: "1"

  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m

# Strimzi KafkaConnect CR with embedded Debezium PostgreSQL connector plugin.
# Strimzi operator builds a custom Docker image (debezium-connect) containing
# the connector JAR, then deploys it as a Connect cluster.
#
# version: Kafka protocol version — must match the Strimzi Kafka CR.
# KafkaUser "debezium" (tls type) provides mTLS credentials.
# config.providers.file allows injecting DB credentials from mounted Secret files.

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium
  annotations:
    # Allow KafkaConnector CRs to manage connectors via this Connect cluster
    strimzi.io/use-connector-resources: "true"
spec:
  version: {{ .Values.kafka.version }}
  replicas: 1
  bootstrapServers: {{ .Values.kafka.bootstrapServers }}

  # mTLS to Kafka (cert from Strimzi CA)
  tls:
    trustedCertificates:
      - secretName: kafka-cluster-ca-cert
        certificate: ca.crt

  # KafkaUser "debezium" secret (tls type) — created by Strimzi UserOperator
  authentication:
    type: tls
    certificateAndKey:
      secretName: debezium
      certificate: user.crt
      key: user.key

  # Mount Vault-synced secret so FileConfigProvider can read DB credentials
  externalConfiguration:
    volumes:
      - name: debezium-pg-creds
        secret:
          secretName: {{ .Values.postgres.credentialsSecret }}

  # Strimzi builds a custom Connect image with the Debezium plugin bundled
  build:
    output:
      type: docker
      image: {{ .Values.connect.image }}
      additionalKanikoOptions:
        - "--insecure"
        - "--insecure-pull"
    plugins:
      - name: debezium-postgres
        artifacts:
          - type: tgz
            url: {{ .Values.connect.debeziumPluginUrl }}

  config:
    # FileConfigProvider — reads credentials from mounted Secret files
    config.providers: file
    config.providers.file.class: org.apache.kafka.common.config.provider.FileConfigProvider

    # Avro serialization via Apicurio Confluent compat API
    key.converter: io.confluent.kafka.serializers.KafkaAvroSerializer
    value.converter: io.confluent.kafka.serializers.KafkaAvroSerializer
    key.converter.schema.registry.url: {{ .Values.apicurio.url }}
    value.converter.schema.registry.url: {{ .Values.apicurio.url }}

    # Internal Connect topics (single-node local dev)
    offset.storage.replication.factor: "1"
    config.storage.replication.factor: "1"
    status.storage.replication.factor: "1"

  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m

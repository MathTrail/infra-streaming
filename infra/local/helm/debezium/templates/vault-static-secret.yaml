# VSO VaultStaticSecret — syncs Debezium replication user credentials from Vault KV v2
# into K8s Secret "debezium-pg-creds" (fields: username, password).
#
# Pre-requisite: Vault KV v2 secret must exist at:
#   vault kv put kv/local/mathtrail-debezium-kratos \
#     username=debezium_replication \
#     password=<strong-password>
#
# VSO then creates the K8s Secret and keeps it in sync.

apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: debezium-pg-creds
spec:
  vaultAuthRef: {{ .Values.vault.authRef }}
  mount: {{ .Values.vault.mount }}
  type: kv-v2
  path: {{ .Values.vault.path }}
  destination:
    name: debezium-pg-creds
    create: true
  refreshAfter: 1h

# Helm post-install/post-upgrade Job — creates the Debezium replication user in Kratos PostgreSQL.
# Also creates the logical replication publication (requires superuser).
# Idempotent: safe to re-run on every Helm upgrade.

apiVersion: batch/v1
kind: Job
metadata:
  name: debezium-replication-user-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-replication-user
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: {{ .Values.postgres.host }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database }}
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              value: {{ .Values.postgres.adminPassword | quote }}
            - name: DEBEZIUM_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: username
            - name: DEBEZIUM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              until pg_isready -h "$PGHOST" -U "$PGUSER" -q; do
                echo "Waiting for PostgreSQL..." && sleep 2
              done

              echo "Creating Debezium replication user: $DEBEZIUM_USER"

              psql -d postgres -c "
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$DEBEZIUM_USER') THEN
                    CREATE USER $DEBEZIUM_USER REPLICATION LOGIN PASSWORD '$DEBEZIUM_PASSWORD';
                  ELSE
                    ALTER USER $DEBEZIUM_USER WITH PASSWORD '$DEBEZIUM_PASSWORD';
                  END IF;
                END \$\$;
              "

              psql -d postgres -c "GRANT CONNECT ON DATABASE $PGDATABASE TO $DEBEZIUM_USER;"
              psql -d $PGDATABASE -c "GRANT USAGE ON SCHEMA public TO $DEBEZIUM_USER;"
              psql -d $PGDATABASE -c "GRANT SELECT ON TABLE public.identities TO $DEBEZIUM_USER;"
              psql -d $PGDATABASE -c "GRANT SELECT ON TABLE public.identity_verifiable_addresses TO $DEBEZIUM_USER;"
              psql -d $PGDATABASE -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO $DEBEZIUM_USER;"

              psql -d $PGDATABASE -c "
                SELECT FROM pg_publication WHERE pubname = 'dbz_publication'
              " | grep -q "0 rows" && \
              psql -d $PGDATABASE -c "
                CREATE PUBLICATION dbz_publication FOR TABLE public.identities, public.identity_verifiable_addresses;
              " || echo "Publication dbz_publication already exists."

              echo "Replication user setup complete."

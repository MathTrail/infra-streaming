# Strimzi KafkaConnector CR — configures the Debezium PostgreSQL connector.
# Requires KafkaConnect to be in Ready state before it takes effect
# (Strimzi reconciles KafkaConnectors only when their parent Connect cluster is ready).
#
# Transforms pipeline:
#   1. routerIdentities  — RegexRouter: identity.public.identities → identity.users.created
#   2. routerAddresses   — RegexRouter: identity.public.identity_verifiable_addresses → identity.addresses.created
#   3. unwrap            — ExtractNewRecordState: flattens Debezium envelope, adds __op + __ts_ms fields
#
# tasksMax=1 — PostgreSQL WAL replication slot is single-consumer by design.
# DLQ: errors.tolerance=all + dead letter queue topic for deserialization failures.

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: kratos-identity-connector
  labels:
    # Must match the KafkaConnect CR name
    strimzi.io/cluster: debezium
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  # DO NOT increase — Postgres WAL replication slot supports only one consumer
  tasksMax: 1
  config:
    # PostgreSQL connection (credentials via FileConfigProvider from mounted Secret)
    database.hostname: {{ .Values.postgres.host }}
    database.port: {{ .Values.postgres.port | quote }}
    database.user: "${dir:/opt/kafka/external-configuration/debezium-pg-creds:username}"
    database.password: "${dir:/opt/kafka/external-configuration/debezium-pg-creds:password}"
    database.dbname: {{ .Values.postgres.database }}
    database.server.name: kratos

    # Replication slot name (Postgres creates this automatically on first connect)
    slot.name: debezium_identities
    plugin.name: pgoutput

    # Tables to capture — both identity tables needed for Flink Interval JOIN
    table.include.list: "public.identities,public.identity_verifiable_addresses"
    topic.prefix: identity

    # ---- Transform pipeline ----
    transforms: routerIdentities,routerAddresses,unwrap

    # Rename identity.public.identities → identity.users.created
    transforms.routerIdentities.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.routerIdentities.regex: "identity\\.public\\.identities"
    transforms.routerIdentities.replacement: "identity.users.created"

    # Rename identity.public.identity_verifiable_addresses → identity.addresses.created
    transforms.routerAddresses.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.routerAddresses.regex: "identity\\.public\\.identity_verifiable_addresses"
    transforms.routerAddresses.replacement: "identity.addresses.created"

    # Flatten Debezium envelope: keep only the new record state, add __op + __ts_ms
    transforms.unwrap.type: io.debezium.transforms.ExtractNewRecordState
    transforms.unwrap.drop.tombstones: "true"
    transforms.unwrap.add.fields: "op:__op,source.ts_ms:__ts_ms"

    # Dead Letter Queue for deserialization / processing errors
    errors.deadletterqueue.topic.name: identity.users.created.dlq
    errors.deadletterqueue.context.headers.enable: "true"
    errors.tolerance: all

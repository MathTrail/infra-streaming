kafka:
  # AutoMQ image override — Bitnami Kafka chart with AutoMQ binary
  # AutoMQ 1.6.x is based on Kafka 3.7.x — use kraftVersion: 0 (static quorum)
  # to avoid Kafka 4.0 format incompatibilities in Bitnami chart 32.x
  kraftVersion: 0
  # Pinned KRaft secret — prevents ArgoCD from regenerating controller directory IDs
  # on every sync. ArgoCD disables Helm lookup(), so without this the chart generates
  # new random IDs each render, changing checksum/secret → rolling update → quorum broken.
  # cluster-id and controller-N-id values live in templates/kraft-secret.yaml.
  existingKraftSecret: "streaming-automq-kafka-kraft-stable"
  global:
    security:
      allowInsecureImages: true
  image:
    registry: automqinc
    repository: automq
    tag: "1.6.4-bitnami"

  # S3 credentials injected from VSO Secret (automq-s3-creds).
  # authType=static in the URL tells AutoMQ to read KAFKA_S3_ACCESS_KEY/KAFKA_S3_SECRET_KEY.
  extraEnvVars:
    - name: KAFKA_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: automq-s3-creds
          key: access-key
    - name: KAFKA_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: automq-s3-creds
          key: secret-key

  # Pin controller SASL password to prevent quorum breaks.
  # Without existingSecret, Bitnami regenerates controller-password on every
  # ArgoCD sync. When only one controller pod restarts it picks up the new
  # password while the others keep the old one → PLAIN auth fails → quorum breaks.
  # With existingSecret, Bitnami reads the controller-password from the existing
  # K8s secret and never overwrites it. On a fresh cluster the secret is created
  # once with a random password and stays stable for all subsequent restarts.
  sasl:
    existingSecret: streaming-automq-kafka-user-passwords

  # Local dev: PLAINTEXT only — no SASL.
  # AutoMQ's KRaft bootstrap deadlocks with SCRAM-SHA-512: the MetadataLoader
  # (which populates the SCRAM credential store) needs the raft quorum to form,
  # but forming quorum requires SASL auth, which requires the credential store.
  # PLAINTEXT sidesteps this entirely; security is irrelevant in local k3d.
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT

  controller:
    # AutoMQ S3 config — AutoMQ 1.6.x uses s3.*.buckets URI format, not automq.s3.*
    # secretConfig appends to the auto-generated server.properties (config: would replace it)
    # Credentials come from KAFKA_S3_ACCESS_KEY/KAFKA_S3_SECRET_KEY env vars (authType=static).
    # elasticstream.enable=true must be explicit; the Bitnami init script does not include it.
    secretConfig: |
      elasticstream.enable=true
      s3.data.buckets=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyle=true&authType=static
      s3.ops.buckets=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyle=true&authType=static
      s3.wal.path=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyle=true&authType=static
    resources:
      requests:
        memory: 1.5Gi
        cpu: 250m
      limits:
        # Increased from 1.5Gi: AutoMQ requires significant off-heap memory for
        # S3 WAL/data buffers in addition to JVM heap. 1.5Gi caused OOMKill.
        memory: 2.5Gi
        cpu: 1000m
    heapOpts: "-Xms512m -Xmx768m"

  persistence:
    enabled: true
    size: 20Gi
    # IMPORTANT: use SSD StorageClass for acceptable WAL write latency.
    # k3d default (hostpath) is acceptable for local dev.
    storageClass: ""

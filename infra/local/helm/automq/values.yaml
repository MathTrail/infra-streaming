kafka:
  # AutoMQ image override — Bitnami Kafka chart with AutoMQ binary
  # AutoMQ 1.6.x is based on Kafka 3.7.x — use kraftVersion: 0 (static quorum)
  # to avoid Kafka 4.0 format incompatibilities in Bitnami chart 32.x
  kraftVersion: 0
  global:
    security:
      allowInsecureImages: true
  image:
    registry: automqinc
    repository: automq
    tag: "1.6.4-bitnami"

  # S3 credentials injected from VSO Secret (automq-s3-creds)
  extraEnvVars:
    - name: AUTOMQ_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: automq-s3-creds
          key: access-key
    - name: AUTOMQ_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: automq-s3-creds
          key: secret-key

  # SASL/SCRAM-SHA-512
  sasl:
    enabledMechanisms: SCRAM-SHA-512
    interBrokerMechanism: SCRAM-SHA-512
    controllerMechanism: SCRAM-SHA-512
    # Users defined in Vault; provisioned via automq-risingwave-scram, automq-mentor-api-scram, automq-kafka-ui-scram secrets

  listeners:
    client:
      protocol: SASL_PLAINTEXT
    interbroker:
      protocol: SASL_PLAINTEXT

  controller:
    # AutoMQ S3 config — AutoMQ 1.6.x uses s3.*.buckets URI format, not automq.s3.*
    # secretConfig appends to the auto-generated server.properties (config: would replace it)
    # Credentials come from AUTOMQ_S3_ACCESS_KEY/AUTOMQ_S3_SECRET_KEY env vars
    secretConfig: |
      s3.data.buckets=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyleAccessEnabled=true
      s3.ops.buckets=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyleAccessEnabled=true
      s3.wal.path=0@s3://automq-data?region=us-east-1&endpoint=http://streaming-minio:9000&pathStyleAccessEnabled=true
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 1.5Gi
        cpu: 1000m
    heapOpts: "-Xms512m -Xmx768m"

  persistence:
    enabled: true
    size: 20Gi
    # IMPORTANT: use SSD StorageClass for acceptable WAL write latency.
    # k3d default (hostpath) is acceptable for local dev.
    storageClass: ""

# Pinned SASL credentials secret for the AutoMQ KRaft controller quorum.
#
# Without this, Bitnami generates a random controller-password on each Helm
# render. ArgoCD re-renders on every sync, so the password changes every time.
# When only one controller pod restarts, it picks up the new password while
# the others keep the old one — PLAIN auth fails and the quorum breaks.
#
# Fix: own the secret in this wrapper chart with a stable local-dev password.
# sasl.existingSecret in values.yaml points here, preventing Bitnami from
# ever regenerating or overwriting it.
#
# Password is intentionally weak — local k3d only, never used in staging/prod.
apiVersion: v1
kind: Secret
metadata:
  name: streaming-automq-kafka-user-passwords
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: streaming-automq
type: Opaque
stringData:
  controller-password: "automq-controller-local"
  client-passwords: "automq-client-local"
  inter-broker-password: "automq-interbroker-local"
  inter-broker-client-secret: "automq-interbroker-local"
  controller-client-secret: "automq-controller-local"

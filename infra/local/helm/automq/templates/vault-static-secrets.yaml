# MinIO S3 credentials for AutoMQ tiered storage
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: automq-s3-creds
spec:
  type: kv-v2
  mount: secret
  path: local/streaming-minio-automq
  destination:
    name: automq-s3-creds
    create: true
  refreshAfter: 1h
  vaultAuthRef: automq-vault-auth
---
# SCRAM credentials: risingwave producer → AutoMQ
apiVersion: secrets.hashicorp.com/v1beta1

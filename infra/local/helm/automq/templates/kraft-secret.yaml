# Pinned KRaft credentials secret for the AutoMQ cluster.
#
# The upstream chart generates controller-N-id values via common.secrets.passwords.manage,
# which requires a cluster-side lookup to preserve values across upgrades. ArgoCD renders
# templates offline (no lookup), so each render produces new random IDs, causing the
# checksum/secret annotation to change, triggering a rolling update on every sync.
#
# Fix: use existingKraftSecret to bypass the chart's secret generation entirely.
# This secret is owned by this wrapper chart and carries stable, Git-controlled values.
#
# IDs are 22-character base64url strings, the format Kafka's DirectoryId expects.
# cluster-id matches the value previously set in kafka.clusterId.
apiVersion: v1
kind: Secret
metadata:
  name: streaming-automq-kafka-kraft-stable
  namespace: streaming
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: streaming-automq
type: Opaque
stringData:
  cluster-id: "MathTrailLocalDev00001"
  controller-0-id: "ctrl0LocalDevMathTrl01"
  controller-1-id: "ctrl1LocalDevMathTrl01"
  controller-2-id: "ctrl2LocalDevMathTrl01"

risingwave:
  fullnameOverride: "risingwave-frontend"
  service:
    port: 4566

  # TEMPORARY: nightly image required for PostgreSQL 18 CDC support.
  # PG18 fix merged to main 2026-02-11 (risingwavelabs/risingwave#24765), not yet in a stable release.
  # Remove this override once RisingWave v2.9.0+ with PG18 CDC is published.
  image:
    tag: "nightly-20260410"

  metaStore:
    sqlite:
      enabled: true
      path: /var/risingwave/meta/risingwave.db

  metaComponent:
    extraVolumes:
      - name: meta-sqlite
        persistentVolumeClaim:
          claimName: risingwave-meta-sqlite
    extraVolumeMounts:
      - name: meta-sqlite
        mountPath: /var/risingwave/meta

  stateStore:
    s3:
      enabled: true
      endpoint: "http://streaming-minio:9000"
      bucket: "risingwave-data"
      region: "us-east-1"
      forcePathStyle: true
      authentication:
        existingSecretName: "risingwave-minio-creds"

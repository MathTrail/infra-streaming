risingwave:
  fullnameOverride: "risingwave-frontend"
  service:
    port: 4566

  # TEMPORARY: nightly image required for PostgreSQL 18 CDC support.
  # PG18 fix merged to main 2026-02-11 (risingwavelabs/risingwave#24765), not yet in a stable release.
  # Remove this override once RisingWave v2.9.0+ with PG18 CDC is published.
  # registry overridden to Docker Hub: docker.risingwave.com proxies via GHCR/Azure CDN which hangs in this network.
  image:
    registry: "registry-1.docker.io"
    tag: "nightly-20260410"

  metaStore:
    sqlite:
      enabled: true
      path: /var/risingwave/meta/risingwave.db

  metaComponent:
    # PV is provisioned on k3d-mathtrail-dev-server-0 (control-plane node). Tolerate the
    # NoSchedule taint so the pod can always schedule where its volume lives after a reboot.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    extraVolumes:
      - name: meta-sqlite
        persistentVolumeClaim:
          claimName: risingwave-meta-sqlite
    extraVolumeMounts:
      - name: meta-sqlite
        mountPath: /var/risingwave/meta

  stateStore:
    s3:
      enabled: true
      endpoint: "http://streaming-minio:9000"
      bucket: "risingwave-data"
      region: "us-east-1"
      forcePathStyle: true
      authentication:
        existingSecretName: "risingwave-minio-creds"

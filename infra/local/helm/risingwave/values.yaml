tags:
  etcd: true

risingwave:
  metaStore:
    etcd:
      enabled: true
  stateStore:
    s3:
      enabled: true
      endpoint: "http://minio:9000"
      bucket: "risingwave-data"
      region: "us-east-1"
      credentials:
        existingSecret: "risingwave-minio-creds"
        accessKey: "access-key"
        secretKey: "secret-key"

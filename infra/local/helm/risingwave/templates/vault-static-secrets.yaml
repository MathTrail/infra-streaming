# MinIO S3 credentials for RisingWave state storage
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: risingwave-minio-creds
spec:
  type: kv-v2
  mount: secret
  path: local/streaming-minio-risingwave
  destination:
    name: risingwave-minio-creds
    create: true
  refreshAfter: 1h
  vaultAuthRef: risingwave-vault-auth
---
# PostgreSQL CDC credentials for RisingWave source connector
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: risingwave-pg-creds
spec:
  type: kv-v2
  mount: secret
  path: local/streaming-risingwave-pg-creds
  destination:
    name: risingwave-pg-creds
    create: true
  refreshAfter: 1h
  vaultAuthRef: risingwave-vault-auth
---
# SCRAM credentials: RisingWave → AutoMQ (same Vault KV path as automq-risingwave-scram)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: risingwave-automq-scram
spec:
  type: kv-v2
  mount: secret
  path: local/streaming-automq-risingwave
  destination:
    name: risingwave-automq-scram
    create: true
  refreshAfter: 1h
  vaultAuthRef: risingwave-vault-auth

apiVersion: v1
kind: ConfigMap
metadata:
  name: risingwave-setup-sql
data:
  # NOTE: SQL contains ${ENV_VAR} placeholders substituted by envsubst in the Job.
  # Credential values are injected via environment variables from K8s Secrets.
  setup.sql: |
    -- =======================================================================
    -- RisingWave CDC + Stream Processing Setup
    -- =======================================================================

    -- 1. CDC Source — connects to Kratos PostgreSQL via native CDC
    -- Uses replication slot 'risingwave_cdc' and publication 'risingwave_pub'
    -- (both created by cdc-setup-job.yaml)
    CREATE SOURCE IF NOT EXISTS kratos_pg_cdc WITH (
        connector          = 'postgres-cdc',
        hostname           = '${PG_HOST}',
        port               = '${PG_PORT}',
        username           = '${PG_USER}',
        password           = '${PG_PASSWORD}',
        database.name      = '${PG_DATABASE}',
        schema.name        = 'public',
        slot.name          = 'risingwave_cdc',
        publication.name   = 'risingwave_pub'
    );

    -- 2. CDC Tables — expose Postgres tables as RisingWave streaming tables
    --    Column list must match the actual Kratos schema.
    --    NOTE: check exact column names in Kratos before finalizing.
    CREATE TABLE IF NOT EXISTS identities (
        id          VARCHAR,
        schema_id   VARCHAR,
        state       VARCHAR,
        traits      JSONB,       -- first_name / last_name live here
        created_at  TIMESTAMPTZ,
        updated_at  TIMESTAMPTZ,
        PRIMARY KEY (id)
    ) FROM kratos_pg_cdc TABLE 'public.identities';

    CREATE TABLE IF NOT EXISTS identity_verifiable_addresses (
        id          VARCHAR,
        identity_id VARCHAR,
        value       VARCHAR,     -- email address
        via         VARCHAR,     -- 'email'
        verified    BOOLEAN,
        created_at  TIMESTAMPTZ,
        PRIMARY KEY (id)
    ) FROM kratos_pg_cdc TABLE 'public.identity_verifiable_addresses';

    -- 3. Materialized View — join CDC tables, produce StudentOnboardingReady event
    --
    --    IMPORTANT: traits JSONB keys ('first_name', 'last_name') must match
    --    the Kratos identity schema configured in identity-api.
    --    Verify against: SELECT traits FROM identities LIMIT 1;
    CREATE MATERIALIZED VIEW IF NOT EXISTS students_onboarding_ready AS
    SELECT
        -- CloudEvents / event metadata
        gen_random_uuid()::VARCHAR      AS event_id,
        -- Domain fields matching students.v1.StudentOnboardingReady proto
        i.id                            AS user_id,
        iva.value                       AS email,
        i.traits->>'first_name'         AS first_name,
        i.traits->>'last_name'          AS last_name,
        'student'                       AS role,
        NOW()::VARCHAR                  AS occurred_at,
        -- CloudEvents Binary Mode headers (standard dash format per CE Kafka Binding spec)
        -- RisingWave maps _headers MAP<VARCHAR, VARCHAR> to Kafka record headers automatically.
        -- to_char used instead of NOW()::VARCHAR to produce RFC 3339 format (T and Z required).
        MAP {
            'ce-specversion': '1.0',
            'ce-type':        'com.mathtrail.students.onboarding.ready',
            'ce-source':      '/mathtrail/risingwave',
            'ce-id':          gen_random_uuid()::VARCHAR,
            'ce-time':        to_char(NOW() AT TIME ZONE 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS"Z"')
        }                               AS _headers
    FROM identities i
    JOIN identity_verifiable_addresses iva
      ON iva.identity_id = i.id
    WHERE iva.via = 'email'
      AND i.state = 'active';

    -- 4. Kafka Sink → AutoMQ
    --    FORMAT PLAIN ENCODE PROTOBUF: produces Confluent Wire Format bytes
    --    (magic byte 0x00 + 4-byte schema_id + protobuf bytes)
    --    schema_id resolved from Apicurio ccompat API by subject name.
    --
    --    VERIFICATION (first deploy):
    --      After first message, check raw bytes in Kafka-UI.
    --      First byte must be 0x00 to confirm Confluent Wire Format.
    --
    --    CLOUDEVENTS HEADERS: implemented via _headers MAP column in the MV above.
    --      RisingWave maps _headers MAP<VARCHAR, VARCHAR> to Kafka record headers automatically.
    --      Standard CloudEvents Kafka Binary Content Mode: ce-type, ce-id, ce-source, ce-time, ce-specversion.
    CREATE SINK IF NOT EXISTS students_onboarding_sink
    FROM students_onboarding_ready
    WITH (
        connector                          = 'kafka',
        properties.bootstrap.server        = '${AUTOMQ_BOOTSTRAP_SERVER}',
        topic                              = 'students.onboarding.ready',
        properties.sasl.mechanism          = 'SCRAM-SHA-512',
        properties.security.protocol       = 'SASL_PLAINTEXT',
        properties.sasl.jaas.config        = 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${AUTOMQ_USERNAME}" password="${AUTOMQ_PASSWORD}";'
    )
    FORMAT PLAIN ENCODE PROTOBUF (
        schema.registry = '${APICURIO_URL}',
        message         = 'students.v1.StudentOnboardingReady'
    );

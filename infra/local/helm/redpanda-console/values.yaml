console:
  config:
    server:
      basePath: /observability/redpanda
    kafka:
      # Plain listener — local dev only.
      # In prod: switch to TLS listener (9093) with KafkaUser credentials.
      brokers:
        - kafka-kafka-bootstrap:9092
      schemaRegistry:
        enabled: true
        urls:
          # Apicurio Confluent compat API — allows Console to decode Avro messages
          - http://mathtrail-apicurio-apicurio-registry:8080/apis/ccompat/v6

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  service:
    type: ClusterIP
    port: 8080

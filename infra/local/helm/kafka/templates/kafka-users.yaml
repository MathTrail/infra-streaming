# KafkaUser CRs — Strimzi creates a K8s Secret named after each user
# containing: user.crt, user.key, user.p12, user.password, ca.crt
# Secret name = KafkaUser metadata.name

---
# debezium: CDC producer → identity.users.created, identity.addresses.created, identity.users.created.dlq
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: debezium
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      # Produce to CDC topics
      - resource:
          type: topic
          name: identity.users.created
          patternType: literal
        operations: [Write, Describe, Create]
      - resource:
          type: topic
          name: identity.addresses.created
          patternType: literal
        operations: [Write, Describe, Create]
      - resource:
          type: topic
          name: identity.users.created.dlq
          patternType: literal
        operations: [Write, Describe, Create]
      # KafkaConnect internal topics
      - resource:
          type: group
          name: connect-debezium
          patternType: literal
        operations: [Read, Describe]
      - resource:
          type: topic
          name: connect-debezium-
          patternType: prefix
        operations: [Read, Write, Describe, Create, Delete]

---
# flink: Stateful stream processing
# Consumes identity.*, produces students.onboarding.ready + DLQ
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: flink
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      # Consume CDC topics
      - resource:
          type: topic
          name: identity.users.created
          patternType: literal
        operations: [Read, Describe]
      - resource:
          type: topic
          name: identity.addresses.created
          patternType: literal
        operations: [Read, Describe]
      # Produce enriched event + DLQ
      - resource:
          type: topic
          name: students.onboarding.ready
          patternType: literal
        operations: [Write, Describe, Create]
      - resource:
          type: topic
          name: identity.users.created.dlq
          patternType: literal
        operations: [Write, Describe, Create]
      # Consumer group for Flink
      - resource:
          type: group
          name: flink-user-enrichment
          patternType: literal
        operations: [Read, Describe]

---
# mentor-api: Domain event consumer → students.onboarding.ready
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: mentor-api
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: students.onboarding.ready
          patternType: literal
        operations: [Read, Describe]
      - resource:
          type: group
          name: mentor-api
          patternType: literal
        operations: [Read, Describe]

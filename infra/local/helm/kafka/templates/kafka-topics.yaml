# KafkaTopic CRs managed by Strimzi TopicOperator
# All topics: 3 partitions, replication factor 1 (single-node local dev)

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: identity.users.created
  labels:
    strimzi.io/cluster: kafka
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"  # 7 days

---
apiVersion: kafka.strimzi.io/v1beta2

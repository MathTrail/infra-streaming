# Schema registration Job — runs after Apicurio is ready.
# Registers Protobuf schemas that are NOT yet owned by individual microservices.
# Schemas consumed by a specific service should be registered in that service's Helm chart.
# Remaining: identity.v1.* (until identity-api gets its own registration job)
#
# Registration endpoint: POST /apis/ccompat/v7/subjects/{subject}/versions
# Using ccompat API (not v2 API) ensures subject names match exactly what
# RisingWave uses when resolving schemas via FORMAT ENCODE PROTOBUF.
#
# Subject naming: {package}.{MessageName} — e.g. identity.v1.UserCreated
# This avoids the default-{artifactId} prefix that v2 API would produce.
#
# Schemas are self-contained (no import directives) — string types throughout,
# no google.protobuf.Timestamp — so plain POST works without references API.
#
# Apicurio ephemeral mode loses schemas on pod restart → Job re-runs on each upgrade.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proto-schemas
data:
  # identity.v1.UserCreated
  # Source: contracts/proto/identity/v1/events.proto
  identity.v1.UserCreated.proto: |
    syntax = "proto3";
    package identity.v1;
    option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
    message UserCreated {
      string event_id    = 1;
      string identity_id = 2;
      string schema_id   = 3;
      string state       = 4;
      string created_at  = 5;
      string op          = 6;
      string ts_ms       = 7;
    }

  # identity.v1.AddressCreated
  # Source: contracts/proto/identity/v1/events.proto
  identity.v1.AddressCreated.proto: |
    syntax = "proto3";
    package identity.v1;
    option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
    message AddressCreated {
      string event_id    = 1;
      string address_id  = 2;
      string identity_id = 3;
      string value       = 4;
      string via         = 5;
      string verified    = 6;
      string created_at  = 7;
      string op          = 8;
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-registration
  annotations:
    # Re-run on every Helm upgrade to re-register schemas after Apicurio pod restarts
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for Apicurio to be ready before registering schemas
        - name: wait-apicurio
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for Apicurio Registry..."
              until curl -sf http://{{ .Release.Name }}-apicurio-registry:8080/apis/registry/v3/system/info; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "Apicurio is ready."
      containers:
        - name: register-schemas
          # Use alpine with curl + jq to safely build JSON body with escaping
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq

              # Apicurio Confluent compat v7 API endpoint.
              # Using ccompat ensures RisingWave can resolve subjects by name without prefix.
              REGISTRY_BASE="http://{{ .Release.Name }}-apicurio-registry:8080/apis/ccompat/v7"

              # register_proto_schema: registers (or updates) a Protobuf schema.
              # $1 = Confluent subject name (must match what RisingWave uses in ENCODE PROTOBUF)
              # $2 = path to .proto file
              register_proto_schema() {
                local subject="$1"
                local proto_file="$2"

                echo "Registering subject: $subject"

                # jq safely escapes the .proto file content as a JSON string
                local body
                body=$(jq -n --rawfile schema "$proto_file" '{"schemaType": "PROTOBUF", "schema": $schema}')

                response=$(curl -sf -X POST \
                  -H "Content-Type: application/vnd.schemaregistry.v1+json" \
                  --data "$body" \
                  "${REGISTRY_BASE}/subjects/${subject}/versions" \
                  || echo "FAILED")

                if echo "$response" | grep -q "FAILED"; then
                  echo "  ERROR registering $subject" >&2
                  exit 1
                fi
                echo "  -> id=$(echo "$response" | jq -r '.id // "unknown"')"
              }

              register_proto_schema \
                "identity.v1.UserCreated" \
                "/schemas/identity.v1.UserCreated.proto"

              register_proto_schema \
                "identity.v1.AddressCreated" \
                "/schemas/identity.v1.AddressCreated.proto"

              echo "All Protobuf schemas registered successfully."
          volumeMounts:
            - name: schemas
              mountPath: /schemas
      volumes:
        - name: schemas
          configMap:
            name: proto-schemas

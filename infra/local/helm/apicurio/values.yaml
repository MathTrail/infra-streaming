apicurio-registry:
  registry:
    # Apicurio 3.x: no per-storage-type image variants, persistence is mem by default
    image:
      tag: "3.2.0"
      persistenceSuffix: false

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

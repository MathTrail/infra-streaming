apicurio-registry:
  registry:
    # Apicurio 3.x: no per-storage-type image variants, persistence is mem by default
    image:
      tag: "3.2.0"
      persistenceSuffix: false

    # Chart probes are hardcoded to /health/* (2.x paths).
    # Restore legacy path so probes work without patching the chart.
    extraEnv:
      - name: QUARKUS_SMALLRYE_HEALTH_ROOT_PATH
        value: /health

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  sync:
    # Schemas are registered via Job — sync CRD operator not needed
    enabled: false

apicurio-registry:
  registry:
    # Apicurio 3.x: no per-storage-type image variants, persistence is mem by default
    image:
      tag: "3.2.0"
      persistenceSuffix: false

    # /health/* paths don't exist in Apicurio 3.x — only registry API responds
    livenessProbe:
      path: /apis/registry/v3/system/info
    readinessProbe:
      path: /apis/registry/v3/system/info

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  sync:
    # Schemas are registered via Job — sync CRD operator not needed
    enabled: false

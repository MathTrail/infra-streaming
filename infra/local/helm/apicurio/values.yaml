apicurio-registry:
  fullnameOverride: "apicurio"
  registry:
    # Apicurio 3.x: no per-storage-type image variants, persistence is mem by default
    image:
      tag: "3.2.0"
      persistenceSuffix: false

    # Serve the registry UI and API at /observability/apicurio so Oathkeeper
    # can proxy it at https://mathtrail.localhost/observability/apicurio without path stripping.
    extraEnv:
      - name: QUARKUS_HTTP_ROOT_PATH
        value: /observability/apicurio

    # Probes hit the pod directly — must include the Quarkus root path prefix.
    livenessProbe:
      path: /observability/apicurio/apis/registry/v3/system/info
    readinessProbe:
      path: /observability/apicurio/apis/registry/v3/system/info

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  sync:
    # Schemas are registered via Job — sync CRD operator not needed
    enabled: false

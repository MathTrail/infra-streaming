# Centrifugo signing keys synced from Vault into K8s Secret centrifugo-secrets.
#
# Vault path: secret/data/centrifugo/secrets
# Required keys:
#   token_hmac_secret_key — HMAC secret for Centrifugo connection and channel JWTs
#   api_key               — API key used by canvas-api to publish via Centrifugo HTTP API
#
# To create in Vault:
#   vault kv put secret/centrifugo/secrets \
#     token_hmac_secret_key=$(openssl rand -hex 32) \
#     api_key=$(openssl rand -hex 32)
#
# destination.namespace must be set explicitly — VSO defaults to the operator's
# own namespace if omitted, not the namespace of this chart.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: centrifugo-secrets
spec:
  type: kv-v2
  mount: secret
  path: centrifugo/secrets
  destination:
    name: centrifugo-secrets
    create: true
    # Explicitly target the streaming namespace so canvas-api-secrets is also
    # available within the same namespace for reference.
    namespace: streaming
  refreshAfter: 1h
  vaultAuthRef: centrifugo-vault-auth

# FlinkDeployment CR — user-enrichment Interval JOIN job.
# Connects identities + verifiable_addresses CDC streams → students.onboarding.ready
#
# Two initContainers run before the Flink containers:
#   s3-plugin-init: copies flink-s3-fs-hadoop-*.jar into /plugins/ so Flink understands s3://
#   jks-init: converts Strimzi KafkaUser PEM certs (user.crt, user.key, ca.crt) → JKS keystores
#             needed because Flink's KafkaSource does not natively support PEM files

apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: user-enrichment
spec:
  image: {{ .Values.job.image }}
  flinkVersion: {{ .Values.job.flinkVersion }}

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"

    # RocksDB: state stored locally; checkpoints persisted to SeaweedFS (S3) for durability
    state.backend: rocksdb
    state.backend.rocksdb.localdir: /tmp/rocksdb
    state.checkpoints.dir: {{ .Values.job.checkpoints.dir }}
    state.savepoints.dir: {{ .Values.job.checkpoints.savepoints }}

    # SeaweedFS S3 endpoint (flink-s3-fs-hadoop plugin uses Hadoop S3A under the hood)
    # path-style access is required for SeaweedFS; endpoint must include http://
    s3.endpoint: {{ .Values.job.seaweedfs.endpoint }}
    s3.path.style.access: "true"
    s3.access-key: {{ .Values.job.seaweedfs.accessKey }}
    s3.secret-key: {{ .Values.job.seaweedfs.secretKey }}

    execution.checkpointing.interval: {{ .Values.job.checkpoints.intervalMs | quote }}
    execution.checkpointing.mode: EXACTLY_ONCE

    # Expose Flink metrics to Prometheus (sidecar or PodMonitor)
    metrics.reporter.prometheus.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prometheus.port: "9249"

  podTemplate:
    spec:
      initContainers:
        # Copy the S3 filesystem plugin so Flink can write checkpoints to s3://
        - name: s3-plugin-init
          image: {{ .Values.job.image }}
          command:
            - sh
            - -c
            - |
              mkdir -p /plugins/s3-fs-hadoop
              cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /plugins/s3-fs-hadoop/
              echo "S3 plugin copied."
          volumeMounts:
            - name: flink-plugins
              mountPath: /plugins

        # Convert PEM certs (from Strimzi KafkaUser secret) to JKS format
        # Flink's KafkaSource/KafkaSink require JKS for SSL configuration
        - name: jks-init
          image: eclipse-temurin:17-jre
          command:
            - sh
            - -c
            - |
              set -e
              echo "Creating JKS truststore from Kafka CA cert..."
              keytool -importcert -noprompt -alias kafka-ca \
                -file /certs/ca.crt \
                -keystore /jks/truststore.jks \
                -storepass {{ .Values.job.kafka.jksTruststorePassword }}

              echo "Creating JKS keystore from Flink mTLS cert..."
              openssl pkcs12 -export \
                -in /certs/user.crt \
                -inkey /certs/user.key \
                -out /tmp/keystore.p12 \
                -passout pass:{{ .Values.job.kafka.jksKeystorePassword }}
              keytool -importkeystore -noprompt \
                -srckeystore /tmp/keystore.p12 -srcstoretype pkcs12 \
                -srcstorepass {{ .Values.job.kafka.jksKeystorePassword }} \
                -destkeystore /jks/keystore.jks \
                -deststorepass {{ .Values.job.kafka.jksKeystorePassword }}

              echo "JKS files created: truststore.jks, keystore.jks"
          volumeMounts:
            - name: kafka-certs
              mountPath: /certs
              readOnly: true
            - name: jks-vol
              mountPath: /jks

      containers:
        - name: flink-main-container
          volumeMounts:
            - name: jks-vol
              mountPath: /opt/flink/certs
              readOnly: true
            - name: flink-plugins
              mountPath: /opt/flink/plugins

      volumes:
        # Strimzi KafkaUser "flink" secret contains: user.crt, user.key, ca.crt
        - name: kafka-certs
          secret:
            secretName: {{ .Values.job.kafka.tlsSecretName }}
        - name: jks-vol
          emptyDir: {}
        - name: flink-plugins
          emptyDir: {}

  jobManager:
    resource:
      memory: "512m"
      cpu: 0.5

  taskManager:
    resource:
      memory: "512m"
      cpu: 0.5

  job:
    jarURI: {{ .Values.job.jobJarUri }}
    parallelism: 1
    # stateless: restart from earliest offset (acceptable for local dev)
    upgradeMode: stateless
    args:
      - "--bootstrap-servers"
      - {{ .Values.job.kafka.bootstrapServers }}
      - "--schema-registry-url"
      - {{ .Values.job.apicurio.url }}
      - "--truststore-location"
      - "/opt/flink/certs/truststore.jks"
      - "--truststore-password"
      - {{ .Values.job.kafka.jksTruststorePassword }}
      - "--keystore-location"
      - "/opt/flink/certs/keystore.jks"
      - "--keystore-password"
      - {{ .Values.job.kafka.jksKeystorePassword }}

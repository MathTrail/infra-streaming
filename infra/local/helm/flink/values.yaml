flink-kubernetes-operator:
  # Empty = watch all namespaces.
  # FlinkDeployments from microservice charts (e.g. mentor-api in mathtrail ns)
  # are picked up automatically — no additional configuration needed here.
  watchNamespaces: []

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

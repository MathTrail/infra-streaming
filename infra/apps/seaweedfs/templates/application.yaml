{{- if .Values.deploy }}
# SeaweedFS — S3-compatible object storage for Flink checkpoints.
# wave 2: parallel with apicurio; depends on Kafka (wave 1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-seaweedfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/seaweedfs
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

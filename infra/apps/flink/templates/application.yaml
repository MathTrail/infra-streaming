{{- if .Values.deploy }}
# Flink operator + user-enrichment stream processing job.
# wave 4: depends on Kafka (wave 1), Apicurio + SeaweedFS (wave 2), Debezium (wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-flink
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/flink
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion
        - .spec.versions[].additionalPrinterColumns[].priority
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
{{- end }}

{{- if .Values.deploy }}
# EventCatalog — event-driven architecture documentation portal.
# wave 5: independent, deployed last alongside kafka-ui.
# Image built from contracts repo (contracts/eventcatalog/).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streaming-eventcatalog
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/eventcatalog
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

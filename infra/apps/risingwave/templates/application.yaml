{{- if .Values.deploy }}
# RisingWave — unified CDC source (replaces Debezium) + stream processing (replaces Flink).
# wave 4: depends on MinIO (wave 1), AutoMQ (wave 2), Apicurio (wave 3), and PostgreSQL (external).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streaming-risingwave
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/risingwave
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

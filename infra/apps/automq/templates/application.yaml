{{- if .Values.deploy }}
# AutoMQ — cloud-native Kafka-compatible broker using MinIO for tiered storage.
# wave 2: depends on MinIO (wave 1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streaming-automq
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/automq
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

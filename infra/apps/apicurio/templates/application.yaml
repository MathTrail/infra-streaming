{{- if .Values.deploy }}
# Apicurio Registry — Protobuf schema registry for AutoMQ topics.
# wave 3: depends on AutoMQ (wave 2) — in case kafkasql persistence is enabled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streaming-apicurio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/apicurio
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

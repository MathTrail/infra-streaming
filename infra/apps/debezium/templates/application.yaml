{{- if .Values.deploy }}
# Debezium CDC connector — streams Kratos PostgreSQL changes to Kafka.
# wave 3: depends on Kafka (wave 1) + Apicurio (wave 2) + VSO secret sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-debezium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra-streaming
    targetRevision: {{ .Values.gitBranch }}
    path: infra/local/helm/debezium
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
